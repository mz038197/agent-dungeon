# Fly.io — see docs/deploy-fly.md
app = "agent-dungeon"
primary_region = "sin"

[build]

[env]
  STUDIO_CLOUD_MODE = "1"
  PEAS_AGENT_HOME = "/data/peas-agent"
  PUBLIC_URL = "https://agent-dungeon.fly.dev"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/_stcore/health"

[mounts]
  source = "peas_data"
  destination = "/data"

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1
